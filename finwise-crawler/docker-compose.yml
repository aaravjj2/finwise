services:
  lightpanda:
    image: lightpanda/browser:nightly
    container_name: finwise-lightpanda
    ports:
      - "9222:9222"
    command: serve --host 0.0.0.0 --port 9222 --obey_robots
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9222/json/version"]
      interval: 15s
      timeout: 5s
      retries: 5
