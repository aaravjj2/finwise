name: Nightly Crawl

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finwise-crawler
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Start Lightpanda
        run: docker compose up -d lightpanda

      - name: Install deps
        run: npm ci

      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LIGHTPANDA_CDP_URL: ws://localhost:9222
        run: npm run crawl
